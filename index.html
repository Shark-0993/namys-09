<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>NAMYS-SWIM | Календарь</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">NAMYS-SWIM</div>
    </header>

    <section class="container">
        <h2>Календарь соревнований</h2>
        <div id="schedule-list">Загрузка расписания...</div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAAvQxBmkTtiTGgb_GsVQZo1YkJMqoBjfU",
            authDomain: "namys-swim.firebaseapp.com",
            projectId: "namys-swim",
            storageBucket: "namys-swim.appspot.com",
            messagingSenderId: "454427203921",
            appId: "1:454427203921:web:7e8ee244d73d4324421b70"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadSchedule() {
            const container = document.getElementById('schedule-list');
            const querySnapshot = await getDocs(collection(db, "schedule"));
            container.innerHTML = "";
            querySnapshot.forEach((doc) => {
                const s = doc.data();
                container.innerHTML += `
                    <div class="event-card">
                        <h3>${s.event}</h3>
                        <p>📍 ${s.location}</p>
                        <p>📅 ${s.date}</p>
                    </div>
                `;
            });
        }
        loadSchedule();
    </script>
</body>
</html>
